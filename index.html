```html
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swish-betalning</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #f5f5f5;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .wrap {
    width: 100%;
    min-height: 100vh;
    padding: env(safe-area-inset-top) 1rem env(safe-area-inset-bottom);
    display: flex;
    flex-direction: column;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text {
    font-size: 22px;
    font-weight: 500;
  }

  .card {
    flex: 1;
    background: #fff;
    border-radius: 16px;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  .field { margin-bottom: 1.25rem; }

  label {
    font-size: 13px;
    margin-bottom: 6px;
    display: block;
  }

  .input-row {
    display: flex;
    border: 1px solid #ccc;
    border-radius: 10px;
    overflow: hidden;
    background: #fafafa;
  }

  .prefix-box {
    padding: 0 12px;
    display: flex;
    align-items: center;
    background: #eee;
  }

  .input-row input {
    flex: 1;
    height: 50px;
    border: none;
    padding: 0 12px;
    font-size: 16px;
    outline: none;
    background: transparent;
  }

  .plain-input {
    width: 100%;
    height: 50px;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 0 12px;
    font-size: 16px;
  }

  .recipient {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    padding: 10px;
    background: #f3f3ff;
    border-radius: 10px;
  }

  .recipient-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .swish-btn {
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 12px;
    background: #4CAF50;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
  }

  .swish-btn:active {
    transform: scale(0.98);
  }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 10px 16px;
    border-radius: 8px;
    display: none;
  }

  .toast.show { display: block; }
</style>
</head>

<body>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">💸</div>
    <span class="logo-text">Swish-betalning</span>
  </div>

  <div class="card">

    <div>
      <div class="recipient">
        <div class="recipient-avatar">UA</div>
        <div>
          <p>Betalning till</p>
          <strong>Ukraina donation</strong>
        </div>
      </div>

      <div class="field">
        <label>Telefonnummer</label>
        <div class="input-row">
          <div class="prefix-box">+46</div>
          <input type="tel" id="phone" placeholder="70 123 45 67">
        </div>
      </div>

      <div class="field">
        <label>Belopp (SEK)</label>
        <input type="number" id="amount" class="plain-input" placeholder="0">
      </div>
    </div>

    <button class="swish-btn" onclick="pay()">Swisha nu</button>

  </div>
</div>

<div class="toast" id="toast">Öppnar Swish...</div>

<script>
function pay() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");

  setTimeout(() => {
    window.location.href = "swish://";
  }, 800);
}
</script>

</body>
</html>
```
